<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03</title>
    <link rel="stylesheet" href="03.css">
</head>
<body>
    <h2>亂濾鏡の照片★</h2>
    <div class="lab-container">
        
        <div class="photo-area">
            <img id="main-photo" src="img/001.JPG" alt="主要照片">
        </div>

        <div class="filter-sidebar">
            <button class="filter-btn" data-filter="none" id="btn-reset">
               原圖...
            </button>
            <button class="filter-btn" data-filter="sepia" id="btn-sepia">
                懷舊感⭑
            </button>
            <button class="filter-btn" data-filter="bw" id="btn-bw">
                經典黑白
            </button>
            <button class="filter-btn" data-filter="contrast" id="btn-contrast">
                高對比の
            </button>
            <button class="filter-btn" data-filter="warm" id="btn-warm">
                溫暖//⭑
            </button>
            <button class="filter-btn" data-filter="cool" id="btn-cool">
                冷色調
            </button>
            <button class="filter-btn" data-filter="invert" id="btn-invert">
                負片效果
            </button>
        </div>

    </div>
    <button class="btn" onclick="window.open('index.html','_blank')">BACK Portfolio✰</button>
    <script src="03.js"></script>
</body>
</html>
